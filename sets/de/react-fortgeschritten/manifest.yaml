# Set-Manifest: React Fortgeschritten (Teil 2) — deutschsprachig.
#
# Direkte Fortsetzung des Sets „React-Grundlagen (Einsteiger)": gleiche Reihe,
# eine Niveau-Stufe höher (B1 statt A2), Sachthema (domain: programming),
# Schwerpunkt Multiple-Choice. Single-Answer-MC ist im Schema als cloze
# select-mode umgesetzt (eine richtige Antwort + plausible distractors);
# „Wähle alle zutreffenden" als cloze multiselect (der #1195-Renderer ist in
# der App gemergt). Ergänzt um matching (Begriff-zu-Zweck) und wenige
# Lückentext-Items (cloze type) mit kurzer, eindeutiger Antwort.
#
# Kein picture_choice (keine Bilder). React-18-korrekt: Hooks-first, keine
# Class-Lifecycle-Methoden als „richtige" Antwort. Code-Schnipsel dürfen im
# Fragetext stehen (Code LESEN und Verhalten bewerten) — keine freie
# Code-Eingabe. Der Content-Loader liest metadata.lessons für die Dateiliste.
schema_version: '1.3'
name: React Fortgeschritten (Teil 2)
description: >-
  Fortsetzung von „React-Grundlagen": acht aufbauende Lektionen (B1) mit
  Schwerpunkt Multiple-Choice zu useEffect, Datenfetching, useContext,
  useRef, Performance (useMemo/useCallback/React.memo), Listen und Keys,
  Formularen (controlled vs. uncontrolled) sowie Komposition und Patterns
  (children, lifting state up, Custom Hooks, Error Boundaries). React-18,
  Hooks-first, konzeptuell — kein freies Code-Schreiben.
